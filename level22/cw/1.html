<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>feedback</h1>
    <form>
        <label for="name">Enter your name</label><br>
            <input type="text" id="name" name="name" maxlength="9" minlength="4" required><br><br>
        <label for="comments">Enter comments</label><br>
            <input type="text" id="comments" name="comments" maxlength="12" minlength="5" required><br><br>
        <h3>rate your experience:</h3>
        <label for="excellent">excellent</label>
            <input type="radio" name="excellent" id="excellent" required><br><br>
        <label for="Good">Good</label>
            <input type="radio" name="Good" id="Good" required><br><br>
        <label for="average">average</label>
            <input type="radio" name="average" id="average" required><br><br>
        <label for="poor">poor</label>
            <input type="radio" name="poor" id="poor" required><br><br>
        <input type="submit">
    </form>
</body>
</html>
