<!--7)შექმენით  div,სადაც უნდა იყოს h1,p
->div<-
1)უკანა ფერი უნდა იყოს ნაცრისფერი

->h1<-
1)უნდა იყოს ვარდისფერი
2)უკანა ფერი უნდა იყოს მწვანე
3)უნდა იყოს ცენტრში
->p<-
1)უნდა იყოს 30px

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: gray;
        }
        h1{
            color: pink;
            background-color: green;
            text-align: center;

        }
        p{
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>goa</h1>
        <p>goa</p>
    </div>
</body>
</html>
