<!--7. შექმენი HTML ფაილი internal CSS-ით, სადაც:
- <h1> იქნება მწვანე
- <p> იქნება ლურჯი
- ორივე ელემენტი იყოს center-ზე
- h1-ის ზომა იყოს 50px
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="style2.css">

    <style>
        h1{
            color:green;
            font-size: 50px;
            text-align: center;
        }
        p{
            color:blue;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>goa</h1>
    <p>goa</p>
</body>
</html>
